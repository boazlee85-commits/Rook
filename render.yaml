services:
  - type: web
    name: rook-backend
    env: node
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true

  - type: web
    name: rook-frontend
    env: node
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l ${PORT:-3000}
    autoDeploy: true
    envVars:
      - key: VITE_SOCKET_URL
        value: https://rook-backend.onrender.com
